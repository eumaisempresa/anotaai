<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - Anota AI | EU+ NEGÓCIO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-color: #060E18;
            --gold-color: #C4A265;
            --text-main: #EEF0F2;
            --text-sec: #A0B1C1;
        }

        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'DM Sans', sans-serif; }
        
        .header {
            border-bottom: 1px solid rgba(196, 162, 101, 0.2);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; }
        .brand span { color: var(--gold-color); font-weight: bold; }

        .filter-bar {
            padding: 20px 40px;
            background: rgba(255,255,255,0.02);
            display: flex;
            gap: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .form-select-admin {
            background-color: #0c1624;
            border: 1px solid var(--gold-color);
            color: var(--text-main);
            padding: 5px 15px;
            border-radius: 5px;
            font-size: 0.8rem;
        }

        .table-container { padding: 30px 40px; }
        .table { color: var(--text-main); font-size: 0.85rem; }
        .table thead th { color: var(--gold-color); font-family: 'Cormorant Garamond', serif; border-bottom: 1px solid var(--gold-color); }
        
        .btn-sync {
            background: transparent;
            border: 1px solid var(--gold-color);
            color: var(--gold-color);
            padding: 5px 15px;
            border-radius: 5px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="brand">EU<span>+</span> NEGÓCIO | <small style="color: var(--gold-color);">Anota AI</small></div>
        <button class="btn-sync" onclick="carregarDados()"><i class="bi bi-arrow-clockwise"></i> Sincronizar Dados Reais</button>
    </div>

    <div class="filter-bar">
        <select class="form-select-admin" id="filtroPlano" onchange="filtrar()">
            <option value="">Todos os Planos</option>
            <option value="Premium">Premium</option>
            <option value="Básico">Básico</option>
            <option value="Free">Free</option>
        </select>
        <select class="form-select-admin" id="filtroStatus" onchange="filtrar()">
            <option value="">Todos os Status</option>
            <option value="Ativo">Ativo</option>
            <option value="Inadimplente">Inadimplente</option>
        </select>
    </div>

    <div class="table-container">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>PRESTADOR</th>
                    <th>PLANO</th>
                    <th>CONTATO</th>
                    <th>DESDE</th>
                    <th>STATUS</th>
                    <th>AÇÕES</th>
                </tr>
            </thead>
            <tbody id="listaPrestadores">
                <tr><td colspan="6" class="text-center py-5">Clique em Sincronizar para carregar da planilha...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxj7oDDxK3j6t_RNKmjUSZjRLXcK_lfRvP1smYUCKuLlj-5gXyMVjsw0BtKAr4u3OxX/exec';

        function carregarDados() {
            const btn = document.querySelector('.btn-sync');
            btn.innerHTML = '<i class="bi bi-arrow-clockwise spin"></i> Carregando...';
            
            fetch(SCRIPT_URL + '?action=get_dados_admin')
            .then(res => res.json())
            .then(data => {
                renderizar(data.prestadores);
                btn.innerHTML = '<i class="bi bi-arrow-clockwise"></i> Sincronizar Dados Reais';
            })
            .catch(() => {
                alert('Erro ao sincronizar. Verifique se o script está publicado como "Qualquer pessoa".');
                btn.innerHTML = '<i class="bi bi-arrow-clockwise"></i> Sincronizar Dados Reais';
            });
        }

        function renderizar(lista) {
            const tbody = document.getElementById('listaPrestadores');
            tbody.innerHTML = lista.map(p => `
                <tr>
                    <td><strong>${p.empresa}</strong><br><small>${p.responsavel}</small></td>
                    <td>${p.plano}</td>
                    <td>${p.whatsapp}</td>
                    <td>${new Date(p.desde).toLocaleDateString()}</td>
                    <td>${p.status}</td>
                    <td><button class="btn btn-sm btn-outline-warning">Gerenciar</button></td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
