<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - Anota Aí+ | EU+ NEGÓCIO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #060E18; --gold-color: #C4A265; --text-main: #EEF0F2; --text-sec: #A0B1C1; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
        .header { border-bottom: 1px solid rgba(196, 162, 101, 0.2); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
        .brand { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; }
        .brand span { color: var(--gold-color); font-weight: bold; }
        .login-screen { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { max-width: 400px; width: 100%; background: rgba(255,255,255,0.02); border: 1px solid var(--gold-color); padding: 30px; border-radius: 15px; }
        .main-content { display: none; flex: 1; padding: 40px; }
        .gold-text { color: var(--gold-color); }
        .btn-gold { background: var(--gold-color); color: var(--bg-color); font-weight: bold; border: none; padding: 12px; }
        .table { color: var(--text-main); border-color: rgba(196,162,101,0.2); }
        .footer { text-align: center; padding: 30px; font-size: 0.8rem; color: var(--text-sec); letter-spacing: 2px; text-transform: uppercase; border-top: 1px solid rgba(196, 162, 101, 0.1); }
        .form-control { background: rgba(255,255,255,0.05); color: white; border-color: var(--gold-color); }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <h2 class="text-center gold-text mb-4" style="font-family: 'Cormorant Garamond'">Admin Master <span style="color:white">+</span></h2>
            <div class="mb-3">
                <label class="form-label">E-mail Master</label>
                <input type="email" id="loginEmail" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Senha Master</label>
                <input type="password" id="loginSenha" class="form-control">
            </div>
            <button onclick="fazerLogin()" class="btn btn-gold w-100">ENTRAR NO MASTER</button>
        </div>
    </div>

    <div id="mainContent" class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h1 class="gold-text" style="font-family: 'Cormorant Garamond'">Gestão Master Anota Aí<span style="color:white">+</span></h1>
            <button onclick="carregarDados()" class="btn btn-outline-light">Sincronizar Planilha</button>
        </div>

        <div class="table-responsive">
            <table class="table table-hover">
                <thead><tr><th>ID</th><th>Empresa</th><th>Responsável</th><th>Plano</th><th>Status</th><th>Início</th><th>Ações</th></tr></thead>
                <tbody id="tabelaAdmin"></tbody>
            </table>
        </div>
    </div>

    <footer class="footer">
        Ecossistema EU+ / Eu+ Empresa / Eu+ Negócio
    </footer>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxj7oDDxK3j6t_RNKmjUSZjRLXcK_lfRvP1smYUCKuLlj-5gXyMVjsw0BtKAr4u3OxX/exec';
        let adminEmail = '', adminSenha = '';

        function fazerLogin() {
            adminEmail = document.getElementById('loginEmail').value;
            adminSenha = document.getElementById('loginSenha').value;
            
            const script = document.createElement('script');
            script.src = `${SCRIPT_URL}?action=get_dados_admin&email=${adminEmail}&senha=${adminSenha}&callback=handleLogin`;
            document.body.appendChild(script);
        }

        function handleLogin(res) {
            if(res.success) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                renderDados(res);
            } else { alert(res.message); }
        }

        function carregarDados() {
            const script = document.createElement('script');
            script.src = `${SCRIPT_URL}?action=get_dados_admin&email=${adminEmail}&senha=${adminSenha}&callback=renderDados`;
            document.body.appendChild(script);
        }

        function renderDados(res) {
            const tbody = document.getElementById('tabelaAdmin');
            tbody.innerHTML = '';
            res.prestadores.forEach(p => {
                tbody.innerHTML += `<tr>
                    <td>${p.id}</td>
                    <td>${p.empresa}</td>
                    <td>${p.responsavel}</td>
                    <td>${p.plano}</td>
                    <td><span class="badge ${p.status === 'Ativo' ? 'bg-success' : 'bg-danger'}">${p.status}</span></td>
                    <td>${new Date(p.inicio).toLocaleDateString()}</td>
                    <td><button class="btn btn-sm btn-outline-gold">Gerenciar</button></td>
                </tr>`;
            });
        }
    </script>
</body>
</html>
